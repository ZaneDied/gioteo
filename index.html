<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Giovanna</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&display=swap" rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #000000;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Caveat', cursive;
            user-select: none;
        }

        /* Custom Dark-Theme Scrollbars (Glassmorphism inspired) */
        ::-webkit-scrollbar {
            width: 12px;
            height: 12px;
        }

        ::-webkit-scrollbar-track {
            background: #000000;
        }

        ::-webkit-scrollbar-thumb {
            background: #2a2a2a;
            border: 2px solid #000000;
            border-radius: 8px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #4a4a4a;
        }

        #outer {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow: auto;
            padding: 40px 20px;
        }

        #book {
            width: 95vw;
            max-width: 1200px;
            aspect-ratio: 1200 / 700;
            margin: 0 auto;
            background: #000000;
            border-radius: 0px;
            box-shadow:
                0 0 0 1px #ffffff,
                0 4px 12px rgba(255, 255, 255, .1),
                0 24px 60px rgba(0, 0, 0, .8);
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
            transition: aspect-ratio 0.3s ease;
        }

        #book::after {
            content: "";
            position: absolute;
            top: 0;
            bottom: 0;
            left: 50%;
            width: 1px;
            background: #333333;
            pointer-events: none;
        }

        #book-svg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            display: block;
        }

        #page-controls {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 20px;
            background: #111111;
            border: 1px solid #333333;
            border-radius: 12px;
            padding: 8px 16px;
            z-index: 100;
            color: #ffffff;
            font-family: 'Caveat', cursive;
            font-size: 24px;
        }

        .page-btn {
            background: transparent;
            border: none;
            color: #888888;
            cursor: pointer;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.1s;
        }

        .page-btn:hover {
            color: #ffffff;
        }

        #loading-overlay {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #aaa;
            font-size: 32px;
            z-index: 1000;
            font-family: 'Caveat', cursive;
        }

        #page-title {
            color: #ffffff;
            font-size: 64px;
            font-weight: 600;
            letter-spacing: 2px;
            margin-bottom: 20px;
            z-index: 50;
            pointer-events: none;
            flex-shrink: 0;
            text-align: center;
        }

        @media (max-width: 768px) {
            #page-title {
                font-size: 32px;
                margin-bottom: 10px;
            }

            #outer {
                padding: 20px 10px;
            }

            #page-controls {
                font-size: 18px;
                padding: 6px 12px;
                bottom: 12px;
            }

            .page-btn {
                font-size: 18px;
            }

            #book {
                aspect-ratio: 600 / 700;
            }

            #book::after {
                display: none;
            }

            .sub-page-btn {
                display: flex !important;
            }
        }

        .sub-page-btn {
            display: none;
            background: rgba(17, 17, 17, 0.8);
            border: 1px solid #333;
            color: #fff;
            padding: 4px 8px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div id="loading-overlay">Loading</div>
    <div id="outer">
        <h1 id="page-title">Giovanna</h1>
        <div id="book">
            <svg id="book-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700">
                <defs>
                    <marker id="ah" markerWidth="10" markerHeight="10" refX="8" refY="3.5" orient="auto">
                        <path d="M0,0.5 L0,6.5 L9,3.5 z" fill="#ffffff" />
                    </marker>
                </defs>
            </svg>
        </div>
    </div>

    <div id="page-controls" style="display: none;">
        <button class="sub-page-btn" id="btn-sub-prev">◄ Page</button>
        <button class="page-btn" id="btn-prev">&#9664;</button>
        <span id="page-num">1</span>
        <button class="page-btn" id="btn-next">&#9654;</button>
        <button class="sub-page-btn" id="btn-sub-next">Page ►</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB8swGz3hRqGqN5A-otheen9x-xicllvWM",
            authDomain: "theo-d48ca.firebaseapp.com",
            databaseURL: "https://theo-d48ca-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "theo-d48ca",
            storageBucket: "theo-d48ca.firebasestorage.app",
            messagingSenderId: "695348212069",
            appId: "1:695348212069:web:1043b21d4de664b1b3f18c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const R = 20;
        const NS = 'http://www.w3.org/2000/svg';
        let pages = [{ nodes: [], arrows: [] }];
        let currentPage = 0;
        let currentSubPage = 0; // 0 = left, 1 = right
        let nodes = pages[0].nodes;
        let arrows = pages[0].arrows;

        const svg = document.getElementById('book-svg');
        const measureCtx = document.createElement('canvas').getContext('2d');

        function mk(tag) { return document.createElementNS(NS, tag); }
        function sa(e, o) { for (const [k, v] of Object.entries(o)) e.setAttribute(k, v); }
        function bid(id) { return nodes.find(n => n.id === id); }

        function getTextWidth(text, font) {
            measureCtx.font = font;
            const lines = (text || ' ').split('\n');
            let maxW = 0;
            for (const l of lines) maxW = Math.max(maxW, measureCtx.measureText(l || ' ').width);
            return maxW;
        }

        function getNodeCenter(n) {
            if (!n) return { x: 0, y: 0 };
            if (n.type === 'circle') return { x: n.x, y: n.y };
            let fs = 22;
            if (n.size === 'header') fs = 36;
            if (n.size === 'arrow') fs = 16;
            const lh = fs * 1.2;
            const exactWidth = getTextWidth(n.label || 'Text', `${fs}px "Caveat", cursive`);
            const w = Math.max(20, exactWidth + (n.size === 'arrow' ? 16 : 24));
            const h = ((n.label || '').split('\n').length || 1) * lh + (n.size === 'arrow' ? 8 : 4);
            const isCenter = n.size === 'arrow';
            const boxX = isCenter ? n.x - w / 2 : n.x;
            const boxY = isCenter ? n.y - h / 2 : n.y;
            return { x: boxX + w / 2, y: boxY + h / 2 };
        }

        function getClosestEdgePoint(n, tx, ty) {
            if (n.type === 'circle') {
                const angle = Math.atan2(ty - n.y, tx - n.x);
                return { x: n.x + R * Math.cos(angle), y: n.y + R * Math.sin(angle) };
            }
            if (n.type === 'text') {
                let fs = 22;
                if (n.size === 'header') fs = 36;
                if (n.size === 'arrow') fs = 16;
                const lh = fs * 1.2;
                const exactWidth = getTextWidth(n.label || 'Text', `${fs}px "Caveat", cursive`);
                const w = Math.max(20, exactWidth + (n.size === 'arrow' ? 16 : 24));
                const h = ((n.label || '').split('\n').length || 1) * lh + (n.size === 'arrow' ? 8 : 4);
                const isCenter = n.size === 'arrow';
                const boxX = isCenter ? n.x - w / 2 : n.x;
                const boxY = isCenter ? n.y - h / 2 : n.y;
                const cx = boxX + w / 2, cy = boxY + h / 2;
                const dx = tx - cx, dy = ty - cy;
                if (dx === 0 && dy === 0) return { x: cx, y: cy };
                const absDx = Math.abs(dx), absDy = Math.abs(dy);
                const halfW = w / 2, halfH = h / 2;
                if (absDx * halfH > absDy * halfW) return { x: cx + Math.sign(dx) * halfW, y: cy + dy * (halfW / absDx) };
                else return { x: cx + dx * (halfH / absDy), y: cy + Math.sign(dy) * halfH };
            }
            return { x: n.x, y: n.y };
        }

        function renderCircle(n) {
            const g = mk('g');
            const c = mk('circle');
            sa(c, { cx: n.x, cy: n.y, r: R, fill: '#000000', stroke: '#ffffff', 'stroke-width': 2 });
            g.appendChild(c);
            svg.appendChild(g);
        }

        function renderTextNode(n) {
            const lbl = n.label || '';
            const lines = lbl.split('\n');
            if (lines.length === 0) lines.push('');
            const g = mk('g');
            if (n.angle && n.size === 'arrow') sa(g, { transform: `rotate(${n.angle} ${n.x} ${n.y})` });
            let fs = 22;
            if (n.size === 'header') fs = 36;
            if (n.size === 'arrow') fs = 16;
            const lh = fs * 1.2;
            const isCenter = n.size === 'arrow';
            const t = mk('text');
            sa(t, { x: isCenter ? n.x : n.x + 12, 'text-anchor': isCenter ? 'middle' : 'start', fill: '#ffffff', 'font-family': 'Caveat, cursive', 'font-size': fs, 'pointer-events': 'none' });
            const startY = isCenter ? n.y + (fs * 0.25) - ((lines.length - 1) * lh) / 2 : n.y + (fs * 0.9);
            lines.forEach((l, i) => {
                const tspan = mk('tspan');
                sa(tspan, { x: isCenter ? n.x : n.x + 12, y: startY + i * lh });
                tspan.textContent = l;
                t.appendChild(tspan);
            });
            g.appendChild(t);
            svg.appendChild(g);
        }

        function renderArrow(arr) {
            const fromN = bid(arr.fromId), toN = arr.toId ? bid(arr.toId) : null;
            const srcC = fromN ? getNodeCenter(fromN) : { x: 0, y: 0 };
            const tgtC = toN ? getNodeCenter(toN) : { x: arr.x2 || srcC.x, y: arr.y2 || srcC.y };
            arr.waypoints = arr.waypoints || [];
            let nextPt = arr.waypoints.length > 0 ? arr.waypoints[0] : tgtC;
            let { x: x1, y: y1 } = fromN ? getClosestEdgePoint(fromN, nextPt.x, nextPt.y) : srcC;
            let prevPt = arr.waypoints.length > 0 ? arr.waypoints[arr.waypoints.length - 1] : srcC;
            let { x: x2, y: y2 } = toN ? getClosestEdgePoint(toN, prevPt.x, prevPt.y) : tgtC;
            const pts = [{ x: x1, y: y1 }, ...arr.waypoints, { x: x2, y: y2 }];
            const path = mk('path');
            sa(path, { d: `M ${pts.map(p => `${p.x},${p.y}`).join(' L ')}`, fill: 'none', stroke: '#ffffff', 'stroke-width': 2, 'stroke-linejoin': 'round', 'marker-end': 'url(#ah)', 'pointer-events': 'none' });
            svg.appendChild(path);
        }

        function updateViewBox() {
            const isMobile = window.innerWidth <= 768;
            if (isMobile) {
                svg.setAttribute('viewBox', `${currentSubPage * 600} 0 600 700`);
            } else {
                svg.setAttribute('viewBox', '0 0 1200 700');
            }
        }

        function render() {
            [...svg.children].forEach(el => { if (el.tagName !== 'defs') el.remove(); });
            arrows.forEach(renderArrow);
            nodes.forEach(n => n.type === 'circle' ? renderCircle(n) : renderTextNode(n));
            document.getElementById('page-num').textContent = currentPage + 1;
            updateViewBox();
        }

        function switchPage(idx) {
            if (idx < 0 || idx >= pages.length) return;
            currentPage = idx;
            nodes = pages[currentPage].nodes || [];
            arrows = pages[currentPage].arrows || [];
            render();
        }

        async function loadCloud() {
            try {
                const snapshot = await get(ref(db, 'canvas/state'));
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    pages = data.pages || [{ nodes: [], arrows: [] }];
                    switchPage(0);
                    document.getElementById('loading-overlay').style.display = 'none';
                    document.getElementById('page-controls').style.display = 'flex';
                } else {
                    document.getElementById('loading-overlay').textContent = 'No theology found.';
                }
            } catch (err) {
                document.getElementById('loading-overlay').textContent = 'Error loading theology.';
            }
        }

        document.getElementById('btn-prev').onclick = () => switchPage(currentPage - 1);
        document.getElementById('btn-next').onclick = () => switchPage(currentPage + 1);

        document.getElementById('btn-sub-prev').onclick = () => {
            currentSubPage = 0;
            updateViewBox();
        };
        document.getElementById('btn-sub-next').onclick = () => {
            currentSubPage = 1;
            updateViewBox();
        };

        window.onresize = updateViewBox;

        loadCloud();
    </script>
</body>

</html>
